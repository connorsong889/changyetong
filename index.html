<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>西青产业通・区域产业内循环赋能平台 | 增强商业版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], } } } }
    </script>
    <!-- 第三方依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.3/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .highlight { background-color: #fef08a; font-weight: bold; padding: 0 2px; border-radius: 2px; color: #b45309; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        .ai-btn-gradient { background: linear-gradient(110deg, #4f46e5 20%, #a855f7 40%, #a855f7 60%, #4f46e5 80%); background-size: 200% auto; color: white; animation: shimmer 3s linear infinite; transition: transform 0.2s, box-shadow 0.2s; }
        .ai-btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -10px rgba(79, 70, 229, 0.5); }
        .badge-core { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }

        .markdown-body h3 { font-size: 1.125rem; font-weight: 700; color: #1e293b; margin-top: 1.2rem; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem;}
        .markdown-body p { margin-bottom: 0.75rem; color: #475569; font-size: 0.95rem; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #475569; font-size: 0.95rem; }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body strong { color: #0f172a; font-weight: 600; }
        
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideDown 0.3s ease-out forwards; }

        .follow-up-area { border-top: 1px solid #e2e8f0; background-color: rgba(248, 250, 252, 0.8); backdrop-filter: blur(4px); padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .follow-up-input-area { display: flex; gap: 0.5rem; }
        .follow-up-input { flex: 1; padding: 0.5rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; font-size: 0.9rem; transition: border-color 0.2s, box-shadow 0.2s; }
        .follow-up-input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
        .follow-up-btn { background-color: #4f46e5; color: white; padding: 0.5rem 1.5rem; border-radius: 0.5rem; font-weight: 500; transition: background-color 0.2s, transform 0.2s; white-space: nowrap; }
        .follow-up-btn:hover { background-color: #4338ca; transform: translateY(-1px); }
        .follow-up-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .suggestion-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .suggestion-btn { background-color: #e0e7ff; color: #4f46e5; padding: 0.3rem 1rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 500; transition: all 0.2s; border: 1px solid #c7d2fe; }
        .suggestion-btn:hover { background-color: #c7d2fe; transform: translateY(-1px); }

        .cyber-core-container { position: relative; width: 140px; height: 140px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        .cyber-ring { position: absolute; border-radius: 50%; border: 2px solid transparent; }
        .cyber-ring.outer { width: 100%; height: 100%; border-top: 2px solid #6366f1; border-bottom: 2px solid #a855f7; animation: spin-slow 4s linear infinite; box-shadow: 0 0 15px rgba(99, 102, 241, 0.3) inset; }
        .cyber-ring.middle { width: 75%; height: 75%; border-left: 2px solid #8b5cf6; border-right: 2px solid #ec4899; animation: spin-reverse 3s linear infinite; border-style: dashed; }
        .cyber-ring.inner { width: 50%; height: 50%; border-top: 2px solid #3b82f6; border-bottom: 2px solid #6366f1; animation: spin-fast 1.5s linear infinite; }
        .cyber-orb { width: 25%; height: 25%; background: radial-gradient(circle, #ffffff 0%, #818cf8 40%, #4f46e5 100%); border-radius: 50%; box-shadow: 0 0 20px #6366f1, 0 0 40px #a855f7; animation: pulse-orb 1.5s ease-in-out infinite alternate; z-index: 10; }
        .floating-kw { position: absolute; font-size: 0.75rem; font-weight: 600; color: #6366f1; background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(99, 102, 241, 0.3); padding: 2px 8px; border-radius: 9999px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); white-space: nowrap; pointer-events: none; z-index: 20; }
        @keyframes spin-slow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes spin-fast { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-orb { 0% { transform: scale(0.85); box-shadow: 0 0 15px #6366f1; } 100% { transform: scale(1.15); box-shadow: 0 0 35px #818cf8, 0 0 60px #a855f7; } }
        .data-stream { font-family: 'Courier New', Courier, monospace; letter-spacing: 1px; color: #6366f1; }
        .elapsed-time-badge { background-color: #e0e7ff; color: #4f46e5; font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 9999px; margin-left: 1rem; font-weight: 500; border: 1px solid #c7d2fe; }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 text-slate-800 font-sans min-h-screen flex flex-col relative">

    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- 头部导航 -->
    <header class="bg-gradient-to-r from-indigo-950 via-indigo-900 to-purple-900 text-white shadow-xl sticky top-0 z-50 border-b border-indigo-500/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-3 md:gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-16 h-10 sm:w-20 sm:h-12 bg-white/10 backdrop-blur-md rounded-xl flex items-center justify-center font-black text-sm sm:text-base shadow-inner relative overflow-hidden shrink-0 border border-white/20 cursor-pointer select-none hover:bg-white/20 transition-colors" onclick="XiqingApp.UI.handleLogoClick()" title="连续点击5次唤醒隐藏配置">
                        <span class="relative z-10 text-transparent bg-clip-text bg-gradient-to-br from-blue-200 to-purple-300 tracking-widest">XEDA</span>
                        <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500/40 to-transparent"></div>
                    </div>
                    <div class="flex flex-col justify-center">
                        <h1 class="text-base sm:text-xl font-extrabold tracking-wide flex items-center flex-wrap gap-2 leading-tight">
                            西青产业通
                            <span class="bg-indigo-500/30 text-indigo-100 text-[10px] sm:text-xs px-2.5 py-0.5 rounded-full border border-indigo-400/40 backdrop-blur-sm mt-1 sm:mt-0">生态架构版 v6.0</span>
                        </h1>
                        <p class="text-[10px] sm:text-xs text-indigo-200/80 mt-0.5 sm:mt-1 font-medium tracking-wider">以智促融强产业，以链循环兴西青</p>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto no-scrollbar pb-1 pt-1 md:pb-0 md:pt-0">
                <input type="file" id="importDocx" accept=".docx" class="hidden" onchange="XiqingApp.handleWordImport(event)">
                <button onclick="document.getElementById('importDocx').click()" class="shrink-0 px-2.5 sm:px-3 py-1.5 sm:py-2 bg-white/5 hover:bg-white/15 text-indigo-50 rounded-lg text-xs sm:text-sm font-medium transition-all border border-white/10 flex items-center gap-1.5 backdrop-blur-sm shadow-sm hover:shadow">
                    <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    导入通鉴
                </button>
                
                <input type="file" id="importExcel" accept=".xlsx, .xls, .csv" class="hidden" onchange="XiqingApp.handleExcelImport(event)">
                <button onclick="document.getElementById('importExcel').click()" class="shrink-0 px-2.5 sm:px-3 py-1.5 sm:py-2 bg-white/5 hover:bg-white/15 text-indigo-50 rounded-lg text-xs sm:text-sm font-medium transition-all border border-white/10 flex items-center gap-1.5 backdrop-blur-sm shadow-sm hover:shadow">
                    <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    导入台账
                </button>

                <button onclick="XiqingApp.UI.showHistoryModal()" class="shrink-0 px-2.5 sm:px-3 py-1.5 sm:py-2 bg-white/5 hover:bg-white/15 text-indigo-50 rounded-lg text-xs sm:text-sm font-medium transition-all border border-white/10 flex items-center gap-1.5 backdrop-blur-sm shadow-sm hover:shadow">
                    <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                    沉淀库
                </button>

                <button onclick="XiqingApp.UI.showApiKeyModal()" class="shrink-0 px-2.5 sm:px-3 py-1.5 sm:py-2 bg-white/5 hover:bg-white/15 text-indigo-50 rounded-lg text-xs sm:text-sm font-medium transition-all border border-white/10 flex items-center gap-1.5 backdrop-blur-sm shadow-sm hover:shadow">
                    <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                    API Key
                </button>
            </div>
        </div>
    </header>

    <!-- 搜索区 -->
    <div class="bg-gradient-to-b from-indigo-900 to-indigo-950 pb-20 sm:pb-28 pt-6 sm:pt-8 shadow-inner relative overflow-hidden">
        <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 32px 32px;"></div>
        <div class="max-w-5xl mx-auto px-4 sm:px-6 relative z-10">
            <div class="bg-white/10 backdrop-blur-xl p-2 rounded-2xl sm:rounded-3xl shadow-2xl flex flex-col md:flex-row items-stretch md:items-center border border-white/20 gap-2 sm:gap-3">
                <div class="pl-4 pr-2 text-indigo-300/60 hidden md:block">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <textarea id="searchInput" rows="2" class="w-full px-4 py-3 text-sm sm:text-base focus:outline-none text-white bg-transparent placeholder-indigo-200/50 resize-none md:h-14 font-medium" placeholder="输入产业或企业需求，如 '低空经济，寻找碳纤维和传感器配套...'" onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); XiqingApp.handleSearch(); }"></textarea>
                
                <div class="flex flex-row md:flex-col lg:flex-row gap-2 w-full md:w-auto px-2 pb-2 md:p-0 shrink-0">
                    <button onclick="XiqingApp.handleSearch()" class="flex-1 md:flex-none bg-white/10 hover:bg-white/20 text-indigo-100 px-4 sm:px-6 py-3 rounded-xl font-semibold transition-colors text-sm sm:text-md whitespace-nowrap border border-white/20 backdrop-blur-sm">
                        精准扫库
                    </button>
                    <button onclick="XiqingApp.handleTriggerAI()" class="flex-1 md:flex-none ai-btn-gradient px-4 sm:px-6 py-3 rounded-xl font-bold text-sm sm:text-md whitespace-nowrap shadow-lg flex items-center justify-center gap-1.5 sm:gap-2">
                        ✨ 生态架构演算
                    </button>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-1.5 sm:gap-2 mt-4 sm:mt-6 justify-center sm:justify-start lg:justify-center" id="categoryFilters">
                <!-- 由 JS 动态渲染分类按钮 -->
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8 w-full -mt-6 sm:-mt-8 relative z-20">
        <div class="flex justify-between items-end mb-4 sm:mb-6 px-1 sm:px-2">
            <h2 class="text-base sm:text-lg font-extrabold text-slate-800 flex items-center gap-2">
                <span class="w-1.5 sm:w-2 h-5 sm:h-6 bg-gradient-to-b from-indigo-500 to-purple-600 rounded-full shadow-sm"></span>
                资源匹配档案
                <span id="resultCount" class="text-xs sm:text-sm font-medium text-slate-500 ml-1 sm:ml-2 bg-slate-200/50 px-2 py-0.5 rounded-md">加载中...</span>
            </h2>
            <button onclick="XiqingApp.handleClearData()" class="text-[10px] sm:text-xs text-slate-400 hover:text-red-500 transition-colors underline font-medium">清空并重置库</button>
        </div>
        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6"></div>
    </main>

    <!-- 弹窗集群 -->
    <!-- AI 推演模态框 -->
    <div id="aiMatchModal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z-[60] backdrop-blur-md p-2 sm:p-4">
        <div class="bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] sm:max-h-[90vh] flex flex-col overflow-hidden border border-indigo-200/50">
            <div class="bg-gradient-to-r from-slate-50 to-indigo-50/50 p-4 sm:p-5 border-b border-indigo-100 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2 sm:gap-3">
                    <div class="p-1.5 sm:p-2 bg-indigo-600 rounded-lg text-white shadow-md shrink-0"><svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></div>
                    <div class="min-w-0">
                        <h3 class="text-base sm:text-xl font-bold text-slate-900 flex items-center flex-wrap gap-2">
                            产业全息推演方案
                            <span id="elapsedTimeBadge" class="elapsed-time-badge hidden whitespace-nowrap shadow-sm">⏱️ 0.0s</span>
                            <span id="draftBadge" class="bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded border border-amber-200 hidden ml-2">断点恢复中</span>
                        </h3>
                    </div>
                </div>
                <button onclick="XiqingApp.UI.closeModal('aiMatchModal')" class="text-slate-400 hover:text-slate-600 bg-white shadow-sm rounded-full p-1.5 sm:p-2 border border-slate-200 transition-colors shrink-0 ml-2"><svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-4 sm:p-8 overflow-y-auto flex-1 relative bg-white" id="aiMatchContent">
                <div id="aiMatchLoading" class="flex flex-col items-center justify-center py-10 sm:py-16 relative">
                    <div id="floating-keywords" class="absolute inset-0 overflow-hidden pointer-events-none z-0 flex justify-center items-center"></div>
                    <div class="cyber-core-container z-10"><div class="cyber-ring outer"></div><div class="cyber-ring middle"></div><div class="cyber-ring inner"></div><div class="cyber-orb"></div></div>
                    <div class="mt-10 text-center z-10 bg-white/80 px-6 py-3 rounded-2xl backdrop-blur-sm border border-slate-100">
                        <h4 class="text-base sm:text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 tracking-[0.2em] mb-2 animate-pulse">ECOSYSTEM ENGINE ACTIVE</h4>
                        <p id="loadingStageText" class="text-sm text-slate-600 font-bold mb-2">全息产业链图谱拆解中...</p>
                        <div id="hex-stream" class="text-xs sm:text-sm data-stream opacity-90 h-5 overflow-hidden font-bold"></div>
                    </div>
                </div>
                <div id="aiMatchResult" class="markdown-body hidden text-sm sm:text-base"></div>
            </div>
            <div class="border-t border-slate-200 bg-slate-50 shrink-0">
                <div class="follow-up-area hidden p-3 sm:p-4" id="followUpArea">
                    <div class="suggestion-buttons" id="suggestionButtons"></div>
                    <div class="follow-up-input-area flex-col sm:flex-row mt-2 sm:mt-0">
                        <input type="text" id="followUpInput" class="follow-up-input text-sm shadow-inner" placeholder="基于方案输入追问，系统将智能判别意图（寻源配套或宏观分析）..." onkeydown="if(event.key==='Enter') XiqingApp.handleFollowUp();"/>
                        <button id="followUpBtn" class="follow-up-btn text-sm py-2 shadow-md" onclick="XiqingApp.handleFollowUp()">核心追问</button>
                    </div>
                </div>
                <div class="p-3 sm:p-4 flex flex-wrap justify-end gap-2 sm:gap-3 bg-white border-t border-slate-100">
                    <button id="exportExcelBtn" onclick="XiqingApp.handleExportExcel()" class="hidden px-4 sm:px-5 py-2 sm:py-2.5 bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold rounded-lg hover:bg-emerald-100 transition-colors shadow-sm text-xs sm:text-sm flex items-center gap-1.5 flex-1 sm:flex-none justify-center">
                        <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>导出推荐台账
                    </button>
                    <button id="saveReportBtn" onclick="XiqingApp.handleSaveReport()" class="hidden px-4 sm:px-5 py-2 sm:py-2.5 bg-indigo-50 border border-indigo-200 text-indigo-700 font-bold rounded-lg hover:bg-indigo-100 transition-colors shadow-sm text-xs sm:text-sm flex items-center gap-1.5 flex-1 sm:flex-none justify-center">
                        <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>沉淀报告
                    </button>
                    <button onclick="XiqingApp.UI.copyToClipboard(document.getElementById('aiMatchResult').innerText)" class="px-4 sm:px-5 py-2 sm:py-2.5 bg-white border border-slate-200 text-slate-700 font-bold rounded-lg hover:bg-slate-50 transition-colors shadow-sm text-xs sm:text-sm flex items-center gap-1.5 flex-1 sm:flex-none justify-center">
                        <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>复制正文
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 图谱配置中心 -->
    <div id="dictConfigModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[70] backdrop-blur-md p-4">

                spawnKeywordParticle(text) { const c = document.getElementById('floating-keywords'); if (!c) return; const el = document.createElement('div'); el.className = 'floating-kw'; el.innerText = text; const a = Math.random() * Math.PI * 2; const r = 80 + Math.random() * 80; el.style.left = (50 + Math.cos(a) * 10) + '%'; el.style.top = (50 + Math.sin(a) * 10) + '%'; const tx = Math.cos(a) * r; const ty = Math.sin(a) * r; el.animate([{ opacity: 0, transform: `translate(0, 0) scale(0.5)` }, { opacity: 1, transform: `translate(${tx*0.5}px, ${ty*0.5}px) scale(1.1)`, offset: 0.2 }, { opacity: 0.8, transform: `translate(${tx*0.8}px, ${ty*0.8}px) scale(1)`, offset: 0.8 }, { opacity: 0, transform: `translate(${tx}px, ${ty}px) scale(0.9)` }], { duration: 2500 + Math.random()*1000, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)', fill: 'forwards' }); c.appendChild(el); setTimeout(() => el.remove(), 3500); },

            /** [模块 5] AI 引擎通讯层 (AI Service) */

                    if (!response.ok) throw new Error(`API 服务异常 (${response.status})`);
                    const reader = response.body.getReader(); const decoder = new TextDecoder('utf-8'); let buffer = '';
                    while (true) {
                        const { done, value } = await reader.read(); if (done) break;
                        buffer += decoder.decode(value, { stream: true }); const lines = buffer.split('\n'); buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (line.startsWith('data: ') && line.slice(6) !== '[DONE]') {
                                try { const parsed = JSON.parse(line.slice(6)); const content = parsed.choices[0]?.delta?.content || ''; if (content) onChunk(content); } catch (e) {}
                            }
                        }
                    }
                }
            };

            /** [模块 6] 文档解析器 (Data Parser) */
            const DocParser = {
                async processWord(arrayBuffer) {
                    const res = await mammoth.extractRawText({arrayBuffer}); let lines = res.value.split(/\r?\n/).map(l => l.trim()).filter(l => l); let map = new Map(); let cur = null; let curCat = '包装/印刷/其他'; let curCtx = 'description'; 
                    const save = (c) => { if (!c || !c.name) return; if (c.prospect && !c.description.includes(c.prospect)) c.description += '\n【前景】' + c.prospect; let ext = map.get(c.name); if (ext) { ext.product += '、' + c.product; ext.description += '\n' + c.description; } else { c.id = 'gen_' + Math.random().toString(36).substr(2, 9); c.weight = Logic.calculateWeight(c.description + ' ' + c.capacity); map.set(c.name, c); } };
                    for (let i = 0; i < lines.length; i++) {
                        let line = lines[i]; if ((line.includes('篇') || line.includes('信息')) && line.length < 25 && !line.endsWith('公司')) { curCat = line.replace(/^[a-zA-Z\d\.\、一二三四五六七八九十]+/, '').replace('篇', '').trim(); continue; } let cleanLine = line.replace(/^[\d\.\、\(\)（）\s]+/, '').trim(); const isCpy = (cleanLine.endsWith('公司') || cleanLine.endsWith('厂') || cleanLine.match(/公司[\(（].*[\)）]$/)) && cleanLine.length >= 4 && cleanLine.length <= 60 && !cleanLine.includes('。');
                        if (isCpy) { save(cur); cur = { name: cleanLine, category: curCat, product: '', description: '', capacity: '', prospect: '' }; curCtx = 'description'; continue; }
                        if (cur) { let mP = line.match(/^(产品名称|核心产品)[：:\s]*(.*)/); let mD = line.match(/^(产品介绍|企业简介)[：:\s]*(.*)/); let mC = line.match(/^(行业资质|资质|企业规模|产能)[：:\s]*(.*)/); if (mP) { let v=mP[2].trim(); if(!v&&i+1<lines.length)v=lines[++i].trim(); if(v) cur.product+=(cur.product?'、':'')+v; curCtx='product'; } else if (mD) { let v=mD[2].trim(); if(!v&&i+1<lines.length)v=lines[++i].trim(); if(v) cur.description+=(cur.description?' ':'')+v; curCtx='description'; } else if (mC) { let v=mC[2].trim(); if(!v&&i+1<lines.length)v=lines[++i].trim(); if(v) cur.capacity+=(cur.capacity?' ':'')+v; curCtx='capacity'; } else if (line.length>2 && !isCpy && !/^\d+$/.test(line)) { if(curCtx==='product') cur.product+=' '+line; else cur.description+=' '+line; } }
                    } save(cur); return Array.from(map.values());
                },
                processExcel(arrayBuffer) {
                    const wb = XLSX.read(new Uint8Array(arrayBuffer), {type: 'array'}); const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); 
                    return json.filter(row => row['企业名称'] || row['公司名称'] || row['Name']).map(row => { const name = row['企业名称'] || row['公司名称'] || row['Name']; const desc = row['经营范围'] || '暂无详情'; const cap = row['规模'] || '台账补充数据'; return { id: 'qcc_' + Math.random().toString(36).substr(2, 9), name, category: "补充产业", product: '详见简介', description: desc, capacity: cap, weight: Logic.calculateWeight(desc + ' ' + cap) }; });
                }
